<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="{{ '/youtube-blog/' | relative_url }}">Youtube Blog</a>
          <a href="{{ '/articles/' | relative_url }}">Publications</a>
          <a href="{{ '/about-me/' | relative_url }}">About Me</a>
          <a href="{{ '/contacts/' | relative_url }}">Contacts</a>
          <a href="{{ '/contacts/' | relative_url }}">CV</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container content-card">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span class="footer-label">Find me online</span>
        <nav class="footer-nav" aria-label="Social links">
          <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer" aria-label="LinkedIn">
            <span class="social-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M6.94 8.5H3.56V20h3.38zm.22-3.69a1.95 1.95 0 1 0-3.89 0 1.95 1.95 0 0 0 3.89 0M20 13.41c0-3.32-1.77-4.86-4.14-4.86a3.57 3.57 0 0 0-3.21 1.77V8.5H9.41V20h3.24v-6.04c0-1.59.3-3.12 2.27-3.12 1.94 0 1.97 1.81 1.97 3.22V20H20z"/>
              </svg>
            </span>
            <span>LinkedIn</span>
          </a>
          <a href="https://www.youtube.com/" target="_blank" rel="noreferrer" aria-label="YouTube">
            <span class="social-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M23 12s0-3.45-.44-5.11a2.67 2.67 0 0 0-1.88-1.88C19.03 4.57 12 4.57 12 4.57s-7.03 0-8.68.44A2.67 2.67 0 0 0 1.44 6.9C1 8.55 1 12 1 12s0 3.45.44 5.1a2.67 2.67 0 0 0 1.88 1.89c1.65.44 8.68.44 8.68.44s7.03 0 8.68-.44a2.67 2.67 0 0 0 1.88-1.89C23 15.45 23 12 23 12M9.75 15.57V8.43L16 12z"/>
              </svg>
            </span>
            <span>YouTube</span>
          </a>
          <a href="https://t.me/" target="_blank" rel="noreferrer" aria-label="Telegram">
            <span class="social-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M21.94 4.64a1 1 0 0 0-1.06-.16L2.7 11.82a1 1 0 0 0 .09 1.88l4.34 1.45 1.64 5.1a1 1 0 0 0 1.8.22l2.43-3.31 4.77 3.48a1 1 0 0 0 1.56-.61l2.87-14.38a1 1 0 0 0-.26-1.01M9.08 14.54l-.64 2.97-.94-2.92 8.88-5.65z"/>
              </svg>
            </span>
            <span>Telegram</span>
          </a>
          <a href="https://github.com/" target="_blank" rel="noreferrer" aria-label="GitHub">
            <span class="social-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.42-4.04-1.42A3.18 3.18 0 0 0 3.68 18c-1.09-.75.08-.74.08-.74a2.52 2.52 0 0 1 1.84 1.24 2.56 2.56 0 0 0 3.5 1 2.57 2.57 0 0 1 .76-1.61c-2.66-.3-5.47-1.33-5.47-5.92A4.64 4.64 0 0 1 5.63 8.7a4.31 4.31 0 0 1 .12-3.18s1-.32 3.3 1.23a11.33 11.33 0 0 1 6 0c2.28-1.55 3.29-1.23 3.29-1.23a4.31 4.31 0 0 1 .12 3.18 4.64 4.64 0 0 1 1.23 3.22c0 4.6-2.81 5.61-5.49 5.91a2.88 2.88 0 0 1 .82 2.23v3.3c0 .32.22.69.83.58A12 12 0 0 0 12 .5"/>
              </svg>
            </span>
            <span>GitHub</span>
          </a>
        </nav>
      </div>
    </footer>
  </body>
</html>
