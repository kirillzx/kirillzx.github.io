---
layout: default
---

<article class="post-page">
  <header class="post-header">
    <span class="eyebrow">Blog Post</span>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
